plugins {
    id 'java'
    id 'application'
}

group = 'com.minecraft.mcpe'
version = '0.1.0'

java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}

repositories {
    mavenCentral()
}

dependencies {
    // Logging
    implementation 'org.slf4j:slf4j-api:2.0.7'
    implementation 'ch.qos.logback:logback-classic:1.4.8'

    // JSON for configuration
    implementation 'com.google.code.gson:gson:2.10.1'

    // Networking
    implementation 'io.netty:netty-all:4.1.93.Final'

    // LWJGL
    implementation platform('org.lwjgl:lwjgl-bom:3.3.3')
    implementation 'org.lwjgl:lwjgl'
    implementation 'org.lwjgl:lwjgl-glfw'
    implementation 'org.lwjgl:lwjgl-opengl'
    implementation 'org.lwjgl:lwjgl-stb'
    implementation 'org.joml:joml:1.10.5'
    runtimeOnly 'org.lwjgl:lwjgl::natives-linux'
    runtimeOnly 'org.lwjgl:lwjgl-glfw::natives-linux'
    runtimeOnly 'org.lwjgl:lwjgl-opengl::natives-linux'
    runtimeOnly 'org.lwjgl:lwjgl-stb::natives-linux'
    runtimeOnly 'org.lwjgl:lwjgl::natives-windows'
    runtimeOnly 'org.lwjgl:lwjgl-glfw::natives-windows'
    runtimeOnly 'org.lwjgl:lwjgl-opengl::natives-windows'
    runtimeOnly 'org.lwjgl:lwjgl-stb::natives-windows'
    runtimeOnly 'org.lwjgl:lwjgl::natives-macos'
    runtimeOnly 'org.lwjgl:lwjgl-glfw::natives-macos'
    runtimeOnly 'org.lwjgl:lwjgl-opengl::natives-macos'
    runtimeOnly 'org.lwjgl:lwjgl-stb::natives-macos'

    // Testing
    testImplementation 'junit:junit:4.13.2'
}

application {
    mainClass = 'com.minecraft.mcpe.MinecraftPE3D'
    applicationName = 'mcpe-java'
}

tasks.named('distZip') {
    archiveBaseName = 'mcpe-java'
}

tasks.named('distTar') {
    archiveBaseName = 'mcpe-java'
}

tasks.named('jar') {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    archiveBaseName = 'mcpe-java'

    manifest {
        attributes 'Main-Class': 'com.minecraft.mcpe.MinecraftPE'
    }
    
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}
